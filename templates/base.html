<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }} – Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- TOP NAVBAR -->
    <nav class="navbar">
        <div class="nav-name">{{ name }}</div>
        <div class="nav-links">
            <a href="/" class="nav-btn {% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/experience" class="nav-btn {% if request.path == '/experience' %}active{% endif %}">Experience</a>
            <a href="/education" class="nav-btn {% if request.path == '/education' %}active{% endif %}">Education</a>
            <a href="/skills" class="nav-btn {% if request.path == '/skills' %}active{% endif %}">Skills</a>
            <a href="/projects" class="nav-btn {% if request.path == '/projects' %}active{% endif %}">Projects</a>
            <a href="/contact" class="nav-btn {% if request.path == '/contact' %}active{% endif %}">Contact</a>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
